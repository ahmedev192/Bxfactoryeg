<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أوامر الإنتاج</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,'Segoe UI',Tahoma,Arial,sans-serif;background:#111;color:#e8e8e8;min-height:100vh;direction:rtl}
.app{max-width:600px;margin:0 auto;padding:0 0 40px}
.topbar{background:#1a1a1a;border-bottom:0.5px solid #2e2e2e;padding:11px 14px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
.topbar h1{font-size:14px;font-weight:600}
.topbar p{font-size:10px;color:#777;margin-top:2px}
.pill{background:#222;border:0.5px solid #333;border-radius:20px;padding:4px 12px;font-size:12px;font-weight:500;color:#ccc}
.sec{background:#1a1a1a;border-top:0.5px solid #2a2a2a;border-bottom:0.5px solid #2a2a2a;margin-top:10px;padding:0 14px 14px}
.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:12px 0 10px;border-bottom:0.5px solid #252525;margin-bottom:10px}
.sec-title{font-size:12px;font-weight:500;color:#ccc}
.fc{background:#222;border-radius:8px;border:0.5px solid #2e2e2e;margin-bottom:7px;overflow:hidden;display:flex;align-items:stretch}
.fc-body{flex:1;padding:8px 10px}
.fc-body label{display:block;font-size:10px;color:#666;margin-bottom:3px;font-weight:500}
.fc-body input,.fc-body textarea{width:100%;border:none;background:transparent;font-size:13px;color:#e8e8e8;outline:none;font-family:inherit;padding:0;line-height:1.5}
.fc-body input[type=date]{color-scheme:dark}
.fc-body textarea{resize:none;min-height:40px}
.fc-del{display:flex;align-items:center;padding:0 11px;border-right:0.5px solid #2e2e2e;cursor:pointer;color:#555;font-size:15px;transition:color .15s,background .15s}
.fc-del:hover{color:#e05555;background:#2a1a1a}
.add-btn{display:flex;align-items:center;gap:6px;width:100%;padding:10px 12px;border:1px dashed #2e2e2e;border-radius:8px;background:transparent;cursor:pointer;font-size:12px;color:#666;font-family:inherit;margin-top:4px}
.add-btn:hover{background:#222;color:#aaa}
.btn-sm{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;font-size:12px;border:0.5px solid #333;border-radius:7px;cursor:pointer;background:#222;color:#ccc;font-family:inherit}
.btn-sm:hover{background:#2a2a2a}
.inp{padding:8px 12px;font-size:13px;border:0.5px solid #333;border-radius:7px;background:#222;color:#e8e8e8;outline:none;width:100%;font-family:inherit;color-scheme:dark}
.inp:focus{border-color:#555}
.inp-row{display:flex;gap:8px;margin-bottom:8px;align-items:center}
.inp-row .inp{flex:1}
.mtx-wrap{overflow-x:auto;margin-top:4px}
.mtx{width:100%;border-collapse:collapse;font-size:11px;direction:ltr}
.mtx th{background:#1e1e1e;padding:6px 8px;font-size:10px;font-weight:500;color:#777;border:0.5px solid #2e2e2e;text-align:center;white-space:nowrap}
.mtx td{border:0.5px solid #2e2e2e;padding:0;text-align:center}
.mtx td input{width:100%;border:none;background:transparent;text-align:center;padding:6px 4px;font-size:12px;color:#e8e8e8;outline:none;font-family:inherit}
.mtx td input:focus{background:#1a2e20}
.lbl-cell{padding:6px 10px;font-weight:500;font-size:11px;text-align:right;white-space:nowrap;background:#1e1e1e;color:#ccc;direction:rtl}
.tot-cell{background:#1e1e1e;font-weight:500;padding:6px 8px;color:#ccc;font-size:11px}
.grand-cell{background:#e8e8e8;color:#111;font-weight:500;padding:6px 8px;font-size:11px}
.col-tot{background:#1e1e1e;font-weight:500;font-size:11px;padding:6px 8px;color:#ccc}
.empty-hint{font-size:11px;color:#555;padding:16px 0;text-align:center}
.rx{background:none;border:none;cursor:pointer;color:#555;font-size:12px;padding:2px 5px}
.rx:hover{color:#e05555}
.photo-drop{border:1.5px dashed #2e2e2e;border-radius:10px;padding:22px 14px;text-align:center;cursor:pointer;position:relative;transition:background .15s}
.photo-drop:hover{background:#1e1e1e}
.photo-drop input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.drop-txt{font-size:12px;color:#666;pointer-events:none}
.photo-single{margin-top:10px;position:relative}
.photo-single img{width:100%;border-radius:9px;border:0.5px solid #2e2e2e;display:block;max-height:340px;object-fit:cover}
.photo-grid{display:grid;gap:8px;margin-top:10px}
.photo-item{position:relative;border-radius:9px;overflow:hidden;border:0.5px solid #2e2e2e}
.photo-item img{width:100%;height:180px;object-fit:cover;display:block}
.pdel{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.7);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.pdel:hover{background:rgba(180,0,0,.85)}
.orient-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.orient-opt{border:0.5px solid #2e2e2e;border-radius:7px;padding:10px;text-align:center;cursor:pointer;font-size:12px;background:#222;color:#666;transition:all .15s}
.orient-opt.active{border-color:#666;color:#e8e8e8;background:#2a2a2a}
.chk-row{display:flex;align-items:center;gap:9px;margin-bottom:12px;cursor:pointer}
.chk-row input{width:16px;height:16px;cursor:pointer;accent-color:#e8e8e8}
.chk-row span{font-size:12px;color:#aaa}
.lbl{font-size:10px;color:#666;margin-bottom:5px;font-weight:500}
.btn-export{background:#e8e8e8;color:#111;border:none;width:100%;justify-content:center;padding:13px;font-size:14px;border-radius:9px;display:flex;align-items:center;gap:9px;cursor:pointer;font-family:inherit;font-weight:600}
.btn-export:hover{background:#fff}
.btn-export:active{transform:scale(.98)}
.btn-export:disabled{opacity:.5;cursor:not-allowed}
.status-msg{font-size:11px;text-align:center;margin-top:10px;min-height:16px;color:#666}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div><h1>أوامر الإنتاج</h1><p>Production Order Release</p></div>
    <div class="pill" id="totalPill">0 قطعة</div>
  </div>

  <div class="sec">
    <div class="sec-hdr">
      <div class="sec-title">📋 بيانات الطلب</div>
      <button class="btn-sm" onclick="addField()">+ إضافة</button>
    </div>
    <div id="infoFields"></div>
    <button class="add-btn" onclick="addField()">＋ إضافة بند جديد</button>
  </div>

  <div class="sec">
    <div class="sec-hdr"><div class="sec-title">📐 الألوان والمقاسات</div></div>
    <div class="inp-row">
      <input class="inp" type="text" id="newColor" placeholder="اسم اللون" onkeydown="if(event.key==='Enter')addColor()">
      <button class="btn-sm" onclick="addColor()">+ لون</button>
    </div>
    <div class="inp-row" style="margin-bottom:4px">
      <input class="inp" type="text" id="newSize" placeholder="المقاس" onkeydown="if(event.key==='Enter')addSize()">
      <button class="btn-sm" onclick="addSize()">+ مقاس</button>
    </div>
    <div class="mtx-wrap"><div id="mtxWrap"></div></div>
  </div>

  <div class="sec">
    <div class="sec-hdr">
      <div class="sec-title">🖼 صور الموديل</div>
      <span style="font-size:10px;color:#555" id="photoCount">لا توجد صور</span>
    </div>
    <div class="photo-drop">
      <input type="file" id="photoInput" multiple accept="image/*" onchange="handlePhotos(event)">
      <div class="drop-txt">☁ ارفع صور الموديل هنا<br><span style="font-size:10px;color:#444">صورة واحدة أو أكثر</span></div>
    </div>
    <div id="photoDisplay"></div>
  </div>

  <div class="sec">
    <div class="sec-hdr"><div class="sec-title">📄 تصدير PDF</div></div>
    <div class="lbl">اسم الملف</div>
    <div class="inp-row" style="margin-bottom:12px">
      <input class="inp" type="text" id="pdfName" placeholder="اسم الملف">
      <span style="font-size:11px;color:#555;padding:8px 4px">.pdf</span>
    </div>
    <div class="lbl" style="margin-bottom:7px">اتجاه الصفحة</div>
    <div class="orient-row">
      <div class="orient-opt active" id="opt-p" onclick="setOrient('p')">↕ عمودي</div>
      <div class="orient-opt" id="opt-l" onclick="setOrient('l')">↔ أفقي</div>
    </div>
    <label class="chk-row"><input type="checkbox" id="inclPhotos" checked><span>تضمين الصور في PDF</span></label>
    <button class="btn-export" id="exportBtn" onclick="generatePDF()">⬇ تصدير PDF</button>
    <div class="status-msg" id="statusMsg">يدعم النص العربي الكامل</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
// ─── Arabic reshaper ────────────────────────────────────────────────────────
const FORMS = {
  0x0622:[0xFE81,0xFE82,0,0],0x0623:[0xFE83,0xFE84,0,0],0x0624:[0xFE85,0xFE86,0,0],
  0x0625:[0xFE87,0xFE88,0,0],0x0626:[0xFE89,0xFE8A,0xFE8B,0xFE8C],0x0627:[0xFE8D,0xFE8E,0,0],
  0x0628:[0xFE8F,0xFE90,0xFE91,0xFE92],0x0629:[0xFE93,0xFE94,0,0],0x062A:[0xFE95,0xFE96,0xFE97,0xFE98],
  0x062B:[0xFE99,0xFE9A,0xFE9B,0xFE9C],0x062C:[0xFE9D,0xFE9E,0xFE9F,0xFEA0],0x062D:[0xFEA1,0xFEA2,0xFEA3,0xFEA4],
  0x062E:[0xFEA5,0xFEA6,0xFEA7,0xFEA8],0x062F:[0xFEA9,0xFEAA,0,0],0x0630:[0xFEAB,0xFEAC,0,0],
  0x0631:[0xFEAD,0xFEAE,0,0],0x0632:[0xFEAF,0xFEB0,0,0],0x0633:[0xFEB1,0xFEB2,0xFEB3,0xFEB4],
  0x0634:[0xFEB5,0xFEB6,0xFEB7,0xFEB8],0x0635:[0xFEB9,0xFEBA,0xFEBB,0xFEBC],0x0636:[0xFEBD,0xFEBE,0xFEBF,0xFEC0],
  0x0637:[0xFEC1,0xFEC2,0xFEC3,0xFEC4],0x0638:[0xFEC5,0xFEC6,0xFEC7,0xFEC8],0x0639:[0xFEC9,0xFECA,0xFECB,0xFECC],
  0x063A:[0xFECD,0xFECE,0xFECF,0xFED0],0x0641:[0xFED1,0xFED2,0xFED3,0xFED4],0x0642:[0xFED5,0xFED6,0xFED7,0xFED8],
  0x0643:[0xFED9,0xFEDA,0xFEDB,0xFEDC],0x0644:[0xFEDD,0xFEDE,0xFEDF,0xFEE0],0x0645:[0xFEE1,0xFEE2,0xFEE3,0xFEE4],
  0x0646:[0xFEE5,0xFEE6,0xFEE7,0xFEE8],0x0647:[0xFEE9,0xFEEA,0xFEEB,0xFEEC],0x0648:[0xFEED,0xFEEE,0,0],
  0x0649:[0xFEEF,0xFEF0,0,0],0x064A:[0xFEF1,0xFEF2,0xFEF3,0xFEF4],0x0621:[0xFE80,0,0,0],
};
const NON_JOINING = new Set([0x0621,0x0622,0x0623,0x0624,0x0625,0x0627,0x0629,0x062F,0x0630,0x0631,0x0632,0x0648,0x0649]);

function reshapeArabic(text) {
  const chars = [...text];
  const n = chars.length;
  const out = [];
  for (let i = 0; i < n; i++) {
    const code = chars[i].codePointAt(0);
    const forms = FORMS[code];
    if (!forms) { out.push(chars[i]); continue; }
    const prevCode = i > 0 ? chars[i-1].codePointAt(0) : 0;
    const nextCode = i < n-1 ? chars[i+1].codePointAt(0) : 0;
    const prevJoins = prevCode in FORMS && !NON_JOINING.has(prevCode) && FORMS[prevCode][2];
    const nextJoins = nextCode in FORMS;
    let form;
    if (prevJoins && nextJoins && forms[3]) form = forms[3];
    else if (prevJoins && forms[1]) form = forms[1];
    else if (nextJoins && forms[2]) form = forms[2];
    else form = forms[0];
    out.push(form ? String.fromCodePoint(form) : chars[i]);
  }
  // Reverse segments between spaces for RTL
  const words = out.join('').split(' ');
  return words.map(w => [...w].reverse().join('')).reverse().join(' ');
}

function ar(text) {
  if (!text) return '';
  const hasAr = /[\u0600-\u06FF]/.test(text);
  if (!hasAr) return text;
  return reshapeArabic(text);
}

    d.className = 'fc';
    const inp = f.type === 'textarea'
      ? `<textarea rows="2" oninput="fields[${i}].value=this.value" placeholder="القيمة...">${f.value}</textarea>`
      : `<input type="${f.type}" value="${f.value}" oninput="fields[${i}].value=this.value" placeholder="القيمة...">`;
    d.innerHTML = `<div class="fc-del" onclick="delField(${i})" title="حذف">✕</div><div class="fc-body"><label>${f.label}</label>${inp}</div>`;
    c.appendChild(d);
  });
}
function delField(i) { fields.splice(i,1); renderFields(); }
function addField() {
  fields.push({id:nid++,label:'بند جديد',value:'',type:'text'});
  renderFields();
  const cards = document.querySelectorAll('#infoFields .fc');
  const last = cards[cards.length-1];
  if (last) { last.scrollIntoView({behavior:'smooth',block:'center'}); const inp=last.querySelector('input,textarea'); if(inp) inp.focus(); }
}

function addColor() { const v=document.getElementById('newColor').value.trim(); if(!v||colors.includes(v))return; colors.push(v); document.getElementById('newColor').value=''; renderMatrix(); }
function addSize()  { const v=document.getElementById('newSize').value.trim();  if(!v||sizes.includes(v))return;  sizes.push(v);  document.getElementById('newSize').value='';  renderMatrix(); }

function renderMatrix() {
  const c = document.getElementById('mtxWrap');
  if (!colors.length || !sizes.length) { c.innerHTML='<div class="empty-hint">أضف لوناً ومقاساً لبناء الجدول</div>'; updateTotal(); return; }
  let grand = 0;
  let h = '<table class="mtx"><thead><tr><th style="text-align:right;direction:rtl">اللون</th>';
  sizes.forEach(s => h += `<th>${s} <button class="rx" onclick="removeSize('${s}')">✕</button></th>`);
  h += '<th>المجموع</th><th></th></tr></thead><tbody>';
  colors.forEach((col) => {
    let rowT = 0;
    h += `<tr><td class="lbl-cell">${col}</td>`;
    sizes.forEach(s => { const k=col+'|'+s, v=matrix[k]||''; rowT+=parseInt(v)||0; h+=`<td><input type="number" min="0" value="${v}" onchange="setMtx('${col}','${s}',this.value)"></td>`; });
    grand += rowT;
    h += `<td class="tot-cell">${rowT}</td><td style="border:0.5px solid #2e2e2e;padding:3px 6px"><button class="rx" onclick="removeColor('${col}')">✕</button></td></tr>`;
  });
  h += '<tr><td class="lbl-cell" style="font-weight:600">الإجمالي</td>';
  sizes.forEach(s => { let ct=0; colors.forEach(col=>ct+=parseInt(matrix[col+'|'+s])||0); h+=`<td class="col-tot">${ct}</td>`; });
  h += `<td class="grand-cell">${grand}</td><td style="border:0.5px solid #2e2e2e"></td></tr></tbody></table>`;
  c.innerHTML = h; updateTotal();
}
function setMtx(col,s,v) { matrix[col+'|'+s]=parseInt(v)||0; renderMatrix(); }
function removeColor(col) { colors=colors.filter(c=>c!==col); renderMatrix(); }
function removeSize(s) { sizes=sizes.filter(x=>x!==s); renderMatrix(); }
function updateTotal() { let t=0; Object.values(matrix).forEach(v=>t+=parseInt(v)||0); document.getElementById('totalPill').textContent=t+' قطعة'; }

function handlePhotos(e) {
  const files = Array.from(e.target.files); let loaded=0;
  files.forEach(file => { const r=new FileReader(); r.onload=ev=>{ photos.push({src:ev.target.result}); loaded++; if(loaded===files.length)renderPhotos(); }; r.readAsDataURL(file); });
}
function renderPhotos() {
  const d=document.getElementById('photoDisplay'), n=photos.length;
  document.getElementById('photoCount').textContent = n ? n+' صورة' : 'لا توجد صور';
  if (!n) { d.innerHTML=''; return; }
  if (n===1) {
    d.innerHTML=`<div class="photo-single"><img src="${photos[0].src}"><button class="pdel" onclick="removePhoto(0)">✕</button></div>`;
  } else {
    d.innerHTML=`<div class="photo-grid" style="grid-template-columns:repeat(2,1fr)">`+photos.map((p,i)=>`<div class="photo-item"><img src="${p.src}"><button class="pdel" onclick="removePhoto(${i})">✕</button></div>`).join('')+'</div>';
  }
}
function removePhoto(i) { photos.splice(i,1); renderPhotos(); }
function setOrient(o) { orient=o; document.getElementById('opt-p').className='orient-opt'+(o==='p'?' active':''); document.getElementById('opt-l').className='orient-opt'+(o==='l'?' active':''); }

// ─── PDF generation ──────────────────────────────────────────────────────────
async function generatePDF() {
  const btn=document.getElementById('exportBtn'), msg=document.getElementById('statusMsg');
  btn.disabled=true; btn.textContent='⏳ جارٍ التصدير...'; msg.style.color='#666'; msg.textContent='';

  try {
    const {jsPDF} = window.jspdf;
    const filename = (document.getElementById('pdfName').value.trim() || 'production_order') + '.pdf';
    const inclPhotos = document.getElementById('inclPhotos').checked;
    const doc = new jsPDF({orientation:orient, unit:'mm', format:'a4', compress:true});
    const fontOk = setupFont(doc);

    const pw=orient==='p'?210:297, ph=orient==='p'?297:210;
    const m=5, cw=pw-m*2;
    let y=m;

    const orderNo   = fields.find(f=>f.label==='رقم أمر الإنتاج')?.value||'';
    const modelType = fields.find(f=>f.label==='نوع الموديل')?.value||'';
    const factory   = fields.find(f=>f.label==='اسم المصنع')?.value||'';
    const date      = fields.find(f=>f.label==='التاريخ')?.value||new Date().toISOString().split('T')[0];
    const notes     = fields.find(f=>f.label==='تعليمات')?.value||'';

    const setAr = (size) => { if(fontOk){doc.setFont('Arabic','normal');} doc.setFontSize(size); };
    const setLat = (size, style='normal') => { doc.setFont('helvetica', style); doc.setFontSize(size); };

    // ── Header ──
    doc.setFillColor(20,20,20); doc.rect(m,y,cw,9,'F');
    doc.setTextColor(230,230,230);
    setAr(11); doc.text(ar(factory)||'Production Order', pw-m-1, y+6, {align:'right'});
    setLat(7); doc.text('No: '+(orderNo||'-')+'   '+date, m+1, y+6);
    doc.setTextColor(0,0,0); y+=11;

    // ── Title ──
    setAr(11);
    const titleTxt = ar('أمر إنتاج') + (modelType?' - '+ar(modelType):'');
    doc.text(titleTxt, pw/2, y+5, {align:'center'});
    y+=8; doc.setLineWidth(0.3); doc.line(m,y,pw-m,y); y+=2;

    // ── Info fields (2-col, skip تعليمات) ──
    const infoFields = fields.filter(f=>f.label!=='تعليمات');
    const colW = cw/2-1;
    setAr(7);
    for (let i=0; i<infoFields.length; i+=2) {
      const pair = infoFields.slice(i,i+2);
      pair.forEach((f, col) => {
        const x = m + col*(colW+2);
        const labelAr = ar(f.label)+':';
        const valAr   = f.value ? ar(f.value) : '-';
        // label right-aligned, value right of it
        doc.text(labelAr, x+colW, y+3.5, {align:'right'});
        const labelW = doc.getTextWidth(labelAr);
        doc.text(valAr,   x+colW-labelW-1, y+3.5, {align:'right'});
      });
      y += 5;
    }
    doc.setLineWidth(0.3); doc.line(m,y,pw-m,y); y+=2;

    // ── Matrix ──
    let grand=0;
    if (colors.length && sizes.length) {
      const cc=sizes.length+2, colW2=cw/cc;
      doc.setFillColor(25,25,25); doc.rect(m,y,cw,5,'F');
      doc.setTextColor(255,255,255); setAr(6.5);
      doc.text(ar('اللون/المقاس'), m+colW2*0.5, y+3.4, {align:'center'});
      sizes.forEach((s,i) => doc.text(s, m+colW2*(i+1)+colW2*0.5, y+3.4, {align:'center'}));
      doc.text(ar('المجموع'), m+colW2*(sizes.length+1)+colW2*0.5, y+3.4, {align:'center'});
      doc.setTextColor(0,0,0); y+=5;
      colors.forEach((col,ci) => {
        const bg = ci%2===0?[255,255,255]:[248,248,248];
        doc.setFillColor(...bg); doc.rect(m,y,cw,4.5,'F');
        setAr(6.5);
        doc.text(ar(col), m+colW2*0.5, y+3, {align:'center'});
        let rowT=0;
        setLat(6.5);
        sizes.forEach((s,si) => { const v=parseInt(matrix[col+'|'+s])||0; rowT+=v; if(v) doc.text(''+v,m+colW2*(si+1)+colW2*0.5,y+3,{align:'center'}); });
        grand+=rowT;
        doc.setFont('helvetica','bold'); doc.text(''+rowT, m+colW2*(sizes.length+1)+colW2*0.5, y+3, {align:'center'});
        doc.setLineWidth(0.15); doc.rect(m,y,cw,4.5,'S'); y+=4.5;
      });
      doc.setFillColor(220,220,220); doc.rect(m,y,cw,4.5,'F');
      setAr(6.5); doc.text(ar('الإجمالي'), m+colW2*0.5, y+3, {align:'center'});
      setLat(6.5);
      sizes.forEach((s,si) => { let ct=0; colors.forEach(c=>ct+=parseInt(matrix[c+'|'+s])||0); doc.text(''+ct,m+colW2*(si+1)+colW2*0.5,y+3,{align:'center'}); });
      doc.setFillColor(25,25,25); doc.rect(m+colW2*(sizes.length+1),y,colW2,4.5,'F');
      doc.setTextColor(255,255,255); doc.text(''+grand,m+colW2*(sizes.length+1)+colW2*0.5,y+3,{align:'center'});
      doc.setTextColor(0,0,0); doc.setLineWidth(0.15); doc.rect(m,y,cw,4.5,'S'); y+=7;
    } else {
      let t=0; Object.values(matrix).forEach(v=>t+=parseInt(v)||0); grand=t;
    }

    // ── Photos ──
    if (inclPhotos && photos.length) {
      const n=photos.length;
      if (n===1) {
        const maxH=Math.min(ph-y-25,90);
        try { doc.addImage(photos[0].src,'JPEG',m,y,cw,maxH,undefined,'MEDIUM'); } catch(e){}
        y+=maxH+3;
      } else {
        const cols=n<=2?2:n<=4?2:3, rows=Math.ceil(n/cols);
        const imgW=(cw-(cols-1)*3)/cols, imgH=Math.min(imgW*0.7,(ph-y-25)/rows-3);
        photos.forEach((p,i) => { const c2=i%cols,r=Math.floor(i/cols); try{doc.addImage(p.src,'JPEG',m+c2*(imgW+3),y+r*(imgH+3),imgW,imgH,undefined,'MEDIUM');}catch(e){} });
        y+=rows*(imgH+3)+3;
      }
    }

    // ── Notes frame below photos ──
    if (notes) {
      y+=2; doc.setLineWidth(0.2); doc.line(m,y,pw-m,y); y+=2;
      setAr(7); doc.text(ar('التعليمات:'), pw-m, y+3.5, {align:'right'}); y+=5;
      const frameH=Math.min(24,ph-y-8);
      doc.setFillColor(252,252,252); doc.rect(m,y,cw,frameH,'F');
      doc.setLineWidth(0.5); doc.setDrawColor(180,180,180); doc.rect(m,y,cw,frameH,'S');
      doc.setDrawColor(0,0,0);
      setAr(7);
      const noteLines = doc.splitTextToSize(ar(notes), cw-4);
      noteLines.slice(0, Math.floor(frameH/3.5)).forEach((l,li) => doc.text(l, pw-m-2, y+3.5+li*3.5, {align:'right'}));
      y+=frameH+3;
    }

    // ── Footer ──
    setLat(5.5); doc.setTextColor(150,150,150);
    doc.text((factory||'Production Order')+' | '+date+' | Total: '+grand+' pcs', pw/2, ph-2, {align:'center'});

    doc.save(filename);
    msg.textContent='✓ تم التصدير بنجاح';
    msg.style.color='#4a9';
  } catch(err) {
    msg.textContent='خطأ في التصدير: ' + err.message;
    msg.style.color='#e55';
    console.error(err);
  }
  btn.disabled=false; btn.textContent='⬇ تصدير PDF';
}

renderFields();
renderMatrix();
</script>
</body>
</html>
